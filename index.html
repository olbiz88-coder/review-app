<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>把心安顿好 · 学员回馈</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useRef } = React;

/* ============ 部署前改这里 ============ */
const FB_PAGE     = "christinenlp";                  // 你的 FB 专页用户名(电脑端会直达推荐区)
const FB_DEEPLINK = "https://urlgeni.us/facebook/kbxWWr";  // 手机深度链接(稳定打开你的专页);留空则用上面的 FB_PAGE
const FB_NAME     = "christine NLP 智慧私塾";       // 专页名称(显示用)
const GOOGLE_LINK = "";                              // 暂时留空 = 不显示 Google;以后想加,再把评论链接/PlaceID 填进引号里就行
/* ===================================== */

const COURSES = ["《把心安顿好》工作坊","NLP 执行师认证课程","一对一咨询 / 教练","心理资本工作坊","其他"];
const QUESTIONS = [
  { key:"before",    label:"上课前,你最大的困扰或卡住的地方是什么?", ph:"例如:常常太在意别人的看法,情绪容易被影响…" },
  { key:"moment",    label:"课程中,哪个部分让你印象最深?",         ph:"例如:老师带我们做的那个练习,让我突然看见…" },
  { key:"change",    label:"课后,你感觉自己有什么改变?",           ph:"例如:现在遇到事情,我比较能稳住自己…" },
  { key:"recommend", label:"你最想推荐给谁?",                       ph:"例如:身边总是为别人而活、忘了自己的姐妹…" },
];

function buildFbUrl(input){
  let s=(input||"").trim(); if(!s) return "";
  if(/facebook\.com\/(share|profile\.php)/i.test(s)) return s; // 分享短链等无法直达评论区,原样打开专页
  s=s.replace(/^https?:\/\//i,"").replace(/^www\./i,"").replace(/^(m\.|web\.)?facebook\.com\//i,"");
  s=s.replace(/\/+$/,"").replace(/\/reviews$/i,"");
  return "https://www.facebook.com/"+s.split(/[/?#]/)[0]+"/reviews/";
}
function buildGoogleUrl(input){
  let s=(input||"").trim(); if(!s) return "";
  if(/^https?:\/\//i.test(s)) return s;
  if(/^g\.page\//i.test(s)) return "https://"+s;
  return "https://search.google.com/local/writereview?placeid="+s;
}
function compressImage(file,maxW=900,q=0.7){
  return new Promise((resolve)=>{
    const r=new FileReader();
    r.onload=(e)=>{ const img=new Image(); img.onload=()=>{
      const scale=Math.min(1,maxW/img.width); const c=document.createElement("canvas");
      c.width=img.width*scale; c.height=img.height*scale;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL("image/jpeg",q));
    }; img.src=e.target.result; };
    r.readAsDataURL(file);
  });
}
function Star({filled,size=36,onClick,onEnter,onLeave}){
  return (<svg onClick={onClick} onMouseEnter={onEnter} onMouseLeave={onLeave}
    width={size} height={size} viewBox="0 0 24 24"
    fill={filled?"#fb923c":"none"} stroke={filled?"#fb923c":"#e7e5e4"} strokeWidth="2"
    style={{cursor:onClick?"pointer":"default"}}>
    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>);
}

function App(){
  const [step,setStep]=useState("welcome");
  const [course,setCourse]=useState("");
  const [customCourse,setCustomCourse]=useState("");
  const [answers,setAnswers]=useState({before:"",moment:"",change:"",recommend:""});
  const [rating,setRating]=useState(0);
  const [hover,setHover]=useState(0);
  const [images,setImages]=useState([]);
  const [error,setError]=useState("");
  const fileRef=useRef(null);
  const [review,setReview]=useState("");
  const [xhsTitle,setXhsTitle]=useState("");
  const [xhsBody,setXhsBody]=useState("");
  const [platform,setPlatform]=useState("fb");
  const [copiedKey,setCopiedKey]=useState("");

  const finalCourse = course==="其他"?customCourse:course;
  const formValid = finalCourse.trim() && answers.before.trim() && answers.change.trim() && rating>0;
  const googleUrl = buildGoogleUrl(GOOGLE_LINK);
  const tabs=[{id:"fb",name:"Facebook"}]; if(googleUrl) tabs.push({id:"google",name:"Google"}); tabs.push({id:"xhs",name:"小红书"});

  async function handleFiles(e){
    const files=Array.from(e.target.files||[]).slice(0,4); const out=[];
    for(const f of files){ try{ out.push(await compressImage(f)); }catch(err){} }
    setImages(prev=>[...prev,...out].slice(0,4));
  }
  async function generate(){
    setError(""); setStep("generating"); setPlatform("fb");
    const prompt = `你是帮学员整理上课心得的文案助手。根据学员真实回答,生成两种版本的文案。

课程:${finalCourse}
上课前困扰:${answers.before}
印象最深:${answers.moment||"(未填)"}
课后改变:${answers.change}
想推荐给谁:${answers.recommend||"(未填)"}
评分:${rating} 星

请严格按以下格式输出,不要有任何额外说明或开场白,三行标记必须原样出现:
===REVIEW===
第一人称评论文案,用于 Facebook / Google 评论。简体中文,真诚自然有温度,像真实学员亲口说的,不浮夸、不 AI 腔。贴近 35–55 岁马来西亚华人女性口吻。自然带出课程名和具体改变,结尾温和推荐给有需要的人。约 120–200 字。
===XHS_TITLE===
小红书风格标题,口语化、有点击欲,可带 1–2 个 emoji,不超过 20 字。
===XHS_BODY===
小红书笔记正文,口语、真诚,用 emoji 自然分段,讲她的转变故事,结尾放 4–5 个相关话题标签如 #自我价值 #内在成长 #NLP #把心安顿好。约 150–250 字。`;
    try{
      const res=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})});
      const data=await res.json();
      const text=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("");
      if(!text || text.indexOf("===REVIEW===")<0) throw new Error("bad");
      const grab=(a,b)=>{ var s=text.indexOf(a); if(s<0) return ""; var f=s+a.length; var e=b?text.indexOf(b,f):text.length; if(e<0)e=text.length; return text.slice(f,e).trim(); };
      setReview(grab("===REVIEW===","===XHS_TITLE==="));
      setXhsTitle(grab("===XHS_TITLE===","===XHS_BODY==="));
      setXhsBody(grab("===XHS_BODY===",null));
      setStep("result");
    }catch(err){ setError("生成时遇到一点状况,请再试一次。"); setStep("form"); }
  }
  function copy(text,key){
    const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select();
    try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta);
    setCopiedKey(key); setTimeout(()=>setCopiedKey(""),2000);
  }
  function reset(){ setStep("welcome"); setCourse(""); setCustomCourse(""); setAnswers({before:"",moment:"",change:"",recommend:""}); setRating(0); setImages([]); setReview(""); setXhsTitle(""); setXhsBody(""); setError(""); setPlatform("fb"); }

  const btn="w-full font-medium py-4 rounded-2xl transition flex items-center justify-center gap-2";
  const orange=btn+" bg-orange-500 hover:bg-orange-600 text-white shadow-md";
  const dark=btn+" bg-slate-800 hover:bg-slate-900 text-white";

  return (
  <div className="min-h-screen w-full bg-gradient-to-b from-amber-50 via-stone-50 to-orange-50 flex items-center justify-center p-4">
    <div className="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-stone-100">
      <div className="bg-gradient-to-r from-slate-800 to-blue-900 px-6 py-4 flex items-center gap-2">
        <span className="text-orange-300 text-lg">❤</span><span className="text-white font-medium tracking-wide">把心安顿好</span>
      </div>
      <div className="p-6">

        {step==="welcome" && (
        <div className="text-center py-6">
          <div className="w-16 h-16 mx-auto mb-5 rounded-full bg-orange-100 flex items-center justify-center text-3xl">✨</div>
          <h1 className="text-2xl font-bold text-slate-800 mb-3">谢谢你的同行 🌿</h1>
          <p className="text-stone-600 mb-1">花 2 分钟,简单回答几个问题</p>
          <p className="text-stone-600 mb-8">让我帮你把这趟旅程的收获,整理成一段真心话</p>
          <button className={orange} onClick={()=>setStep("form")}>开始 →</button>
        </div>)}

        {step==="form" && (
        <div>
          <button onClick={()=>setStep("welcome")} className="text-stone-400 mb-4 text-sm">← 返回</button>
          {error && <div className="mb-4 bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl">{error}</div>}
          <label className="block text-slate-800 font-medium mb-2">你上的是哪一个课程?<span className="text-orange-500">*</span></label>
          <div className="grid grid-cols-2 gap-2 mb-2">
            {COURSES.map(c=>(<button key={c} onClick={()=>setCourse(c)} className={"text-sm px-3 py-2.5 rounded-xl border text-left "+(course===c?"border-orange-400 bg-orange-50 text-orange-700":"border-stone-200 text-stone-600")}>{c}</button>))}
          </div>
          {course==="其他" && <input value={customCourse} onChange={e=>setCustomCourse(e.target.value)} placeholder="请输入课程名称" className="w-full mb-2 px-4 py-3 rounded-xl border border-stone-200 outline-none text-slate-700" />}
          <div className="mt-5 space-y-5">
            {QUESTIONS.map(q=>(
            <div key={q.key}>
              <label className="block text-slate-800 font-medium mb-2">{q.label}{(q.key==="before"||q.key==="change")&&<span className="text-orange-500">*</span>}</label>
              <textarea value={answers[q.key]} onChange={e=>setAnswers({...answers,[q.key]:e.target.value})} placeholder={q.ph} rows={3} className="w-full px-4 py-3 rounded-xl border border-stone-200 outline-none text-slate-700 resize-none" />
            </div>))}
          </div>
          <div className="mt-6">
            <label className="block text-slate-800 font-medium mb-3">为这次课程打个分<span className="text-orange-500">*</span></label>
            <div className="flex gap-2 justify-center">
              {[1,2,3,4,5].map(n=>(<Star key={n} filled={n<=(hover||rating)} onClick={()=>setRating(n)} onEnter={()=>setHover(n)} onLeave={()=>setHover(0)} />))}
            </div>
          </div>
          <div className="mt-6">
            <label className="block text-slate-800 font-medium mb-2">上传照片 <span className="text-stone-400 text-sm font-normal">(选填)</span></label>
            <div className="flex flex-wrap gap-2">
              {images.map((src,i)=>(<div key={i} className="relative w-20 h-20 rounded-xl overflow-hidden border border-stone-200"><img src={src} className="w-full h-full object-cover" /><button onClick={()=>setImages(images.filter((_,j)=>j!==i))} className="absolute top-1 right-1 bg-black/50 rounded-full w-5 h-5 text-white text-xs">×</button></div>))}
              {images.length<4 && <button onClick={()=>fileRef.current.click()} className="w-20 h-20 rounded-xl border-2 border-dashed border-stone-300 text-stone-400 text-2xl">📷</button>}
            </div>
            <input ref={fileRef} type="file" accept="image/*" multiple onChange={handleFiles} className="hidden" />
          </div>
          <button onClick={generate} disabled={!formValid} className={formValid?orange+" mt-8":btn+" mt-8 bg-stone-100 text-stone-400 cursor-not-allowed"}>✨ 生成我的回馈</button>
          {!formValid && <p className="text-center text-xs text-stone-400 mt-2">请填写带 * 的必填项</p>}
        </div>)}

        {step==="generating" && (
        <div className="text-center py-16">
          <div className="text-4xl mb-4 animate-pulse">✍️</div>
          <p className="text-slate-700 font-medium mb-1">正在帮你整理这段心里话…</p>
          <p className="text-stone-400 text-sm">请稍候几秒</p>
        </div>)}

        {step==="result" && (
        <div>
          <div className="text-center mb-5">
            <div className="w-14 h-14 mx-auto mb-3 rounded-full bg-green-100 flex items-center justify-center text-2xl">✓</div>
            <h2 className="text-xl font-bold text-slate-800">你的回馈已经写好啦</h2>
            <p className="text-stone-500 text-sm mt-1">选一个平台,可直接修改文字</p>
          </div>
          <div className="flex gap-2 mb-4 bg-stone-100 p-1 rounded-xl">
            {tabs.map(t=>(<button key={t.id} onClick={()=>setPlatform(t.id)} className={"flex-1 text-sm py-2 rounded-lg font-medium "+(platform===t.id?"bg-white text-slate-800 shadow-sm":"text-stone-500")}>{t.name}</button>))}
          </div>
          {(platform==="fb"||platform==="google") && (
          <div>
            <textarea value={review} onChange={e=>setReview(e.target.value)} rows={8} className="w-full px-4 py-3 rounded-xl border border-stone-200 outline-none text-slate-700 resize-none bg-stone-50" />
            <div className="flex items-center gap-1 mt-3 justify-center">{[1,2,3,4,5].map(n=>(<Star key={n} filled={n<=rating} size={20} />))}</div>
            {images.length>0 && <div className="mt-4 bg-amber-50 rounded-xl p-3 text-sm text-amber-800">💡 别忘了发布时把你的照片一起上传哦!</div>}
            <div className="mt-6 space-y-3">
              <button className={dark} onClick={()=>copy(review,"rev")}>{copiedKey==="rev"?"✓ 已复制!":"复制文案"}</button>
              {platform==="fb"
                ? <a href={FB_DEEPLINK || buildFbUrl(FB_PAGE)} target="_blank" rel="noopener noreferrer" className={orange}>去 Facebook 发布 ↗</a>
                : <a href={googleUrl} target="_blank" rel="noopener noreferrer" className={orange}>去 Google 发布 ↗</a>}
            </div>
                          <div className="mt-4 text-xs text-stone-400 text-center leading-relaxed">{platform==="fb"?"复制文案 → 点按钮打开我的专页 → 手机请点「More 更多 → 推荐」→ 选 Yes、粘贴发布 ❤(电脑会直接到评论区)":"复制文案 → 点按钮直达评论框 → 打星 → 粘贴并发布 ❤"}</div>
          </div>)}
          {platform==="xhs" && (
          <div>
            <label className="block text-slate-700 text-sm font-medium mb-1">标题</label>
            <input value={xhsTitle} onChange={e=>setXhsTitle(e.target.value)} className="w-full px-4 py-3 mb-3 rounded-xl border border-stone-200 outline-none text-slate-700 bg-stone-50" />
            <label className="block text-slate-700 text-sm font-medium mb-1">正文</label>
            <textarea value={xhsBody} onChange={e=>setXhsBody(e.target.value)} rows={9} className="w-full px-4 py-3 rounded-xl border border-stone-200 outline-none text-slate-700 resize-none bg-stone-50" />
            <div className="mt-4 bg-rose-50 rounded-xl p-3 text-sm text-rose-700">📕 小红书要自己发笔记:复制全文 → 打开小红书 → 发新笔记 → 粘贴 + 配上你的照片</div>
            <div className="mt-5 space-y-3">
              <button className={dark} onClick={()=>copy(xhsTitle+"\n\n"+xhsBody,"xhs")}>{copiedKey==="xhs"?"✓ 已复制全文!":"复制标题 + 正文"}</button>
              <a href="https://www.xiaohongshu.com" target="_blank" rel="noopener noreferrer" className={orange}>打开小红书 ↗</a>
            </div>
          </div>)}
          <div className="mt-5 bg-amber-50 rounded-xl p-3 text-xs text-amber-800 text-center leading-relaxed">💡 也想发到其他平台?发完回来,点上方标签切换即可,文案都还在 🌿</div>
          <button onClick={reset} className="w-full mt-4 text-stone-400 text-sm">完成 · 返回首页</button>
        </div>)}

      </div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
